name: san

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.sanitizer }}
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.sanitizer == 'memory' }}
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - address
          - leak
          - memory
          - undefined
    steps:
      - uses: actions/checkout@v4

      - name: Checkout omni
        uses: actions/checkout@v4
        with:
          repository: hyoklee/omni
          path: omni

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libpoco-dev libyaml-cpp-dev

      - name: Build and install omni
        run: |
          cmake -B omni/build omni \
            -DCMAKE_INSTALL_PREFIX=$HOME/omni-install \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}"
          cmake --build omni/build
          cmake --install omni/build

      - name: Configure
        run: |
          cmake -B build \
            -Domni_DIR=$HOME/omni-install/lib/cmake/omni \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DSANITIZER=${{ matrix.sanitizer }} \
            -DSITE="ubuntu-24.04" \
            -DBUILDNAME="wrp-${{ matrix.sanitizer }}san"

      - name: Test
        env:
          ASAN_OPTIONS: abort_on_error=1:detect_leaks=1
          LSAN_OPTIONS: exitcode=1:print_suppressions=0
          # libstdc++ on the runner is not MSan-instrumented, so every call
          # into it (ifstream::open, std::endl->ctype, std::filesystem::path)
          # raises a use-of-uninitialized-value false positive. Without
          # halt_on_error=0, MSan _exit()s at the first such report -- before
          # the program reaches its real exit path -- which breaks the
          # WILL_FAIL tests (they see exit 0 instead of the program's error
          # code) and the omni unit tests (they exit before printing
          # "All tests passed!"). Report but keep running so each program
          # returns its genuine exit code.
          MSAN_OPTIONS: abort_on_error=0:exitcode=0:halt_on_error=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build -C Release -D Experimental

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
