name: lin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-22.04
          - ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Checkout omni
        uses: actions/checkout@v4
        with:
          repository: hyoklee/omni
          path: omni

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake libpoco-dev libyaml-cpp-dev

      - name: Build and install omni
        run: |
          cmake -B omni/build omni -DCMAKE_INSTALL_PREFIX=$HOME/omni-install
          cmake --build omni/build
          cmake --install omni/build

      - name: Configure
        run: |
          cmake -B build \
            -Domni_DIR=$HOME/omni-install/lib/cmake/omni \
            -DSITE="${{ matrix.os }}" \
            -DBUILDNAME="wrp"

      - name: Test
        run: ctest --test-dir build -C Release -D Experimental

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
