name: mac

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
    steps:
      - uses: actions/checkout@v4

      - name: Checkout omni
        uses: actions/checkout@v4
        with:
          repository: hyoklee/omni
          path: omni

      - name: Install dependencies
        run: brew install poco yaml-cpp

      - name: Build and install omni
        run: |
          cmake -B omni/build omni -DCMAKE_INSTALL_PREFIX=$HOME/omni-install
          cmake --build omni/build
          cmake --install omni/build

      - name: Configure
        run: |
          cmake -B build \
            -Domni_DIR=$HOME/omni-install/lib/cmake/omni \
            -DSITE="${{ matrix.os }}" \
            -DBUILDNAME="wrp"

      - name: Test
        run: ctest --test-dir build -C Release -D Experimental

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
